name: Build Mac DMG

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller customtkinter

    - name: Build Mac App
      run: |
        export CTK_PATH=$(python3 -c "import customtkinter, os; print(os.path.dirname(customtkinter.__file__))")
        pyinstaller -y --name "HorariosEscolares" \
          --windowed \
          --noconsole \
          --target-architecture universal2 \
          --add-data "$CTK_PATH:customtkinter/" \
          src/main.py

    - name: Install create-dmg
      run: brew install create-dmg

    - name: Create DMG
      run: |
        create-dmg \
          --volname "Horarios Escolares" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "HorariosEscolares.app" 175 120 \
          --hide-extension "HorariosEscolares.app" \
          --app-drop-link 425 120 \
          "InstaladorHorariosEscolares.dmg" \
          "dist/HorariosEscolares.app"

    - name: Upload DMG Artifact
      uses: actions/upload-artifact@v3
      with:
        name: InstaladorHorariosEscolares-Mac
        path: InstaladorHorariosEscolares.dmg
